<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Steel Structure 3D Preview</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: #202423;
      font-family: Arial, sans-serif;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
      touch-action: none;
      --poster-color: transparent;
    }
    .camera-button {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 5;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: rgba(0,0,0,.62);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .camera-button:active { transform: scale(.96); background: rgba(0,0,0,.78); }
    .camera-button svg { width: 25px; height: 25px; display: block; }
    .tip {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 9px 12px;
      color: #fff;
      background: rgba(0,0,0,.45);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.35;
      pointer-events: none;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 64px;
      z-index: 6;
      transform: translateX(-50%);
      padding: 8px 12px;
      color: #fff;
      background: rgba(0,0,0,.68);
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .2s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .loader {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: #202423;
      color: #f4f7f6;
      transition: opacity .35s ease, visibility .35s ease;
    }
    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-inner {
      display: grid;
      justify-items: center;
      gap: 30px;
      transform: translateY(-8px);
    }
    .cube-mark {
      position: relative;
      width: 156px;
      height: 124px;
      perspective: 620px;
    }
    .cube-row {
      position: absolute;
      left: 18px;
      top: 12px;
      width: 116px;
      height: 58px;
      transform-style: preserve-3d;
      animation: cubeFloat 1.45s ease-in-out infinite alternate;
      transform-origin: 58px 29px;
    }
    .iso-cube {
      position: absolute;
      width: 46px;
      height: 46px;
      transform-style: preserve-3d;
      transform: rotateX(-35deg) rotateY(45deg);
    }
    .iso-cube:nth-child(1) { left: 0; top: 10px; }
    .iso-cube:nth-child(2) { left: 34px; top: -10px; }
    .iso-cube:nth-child(3) { left: 68px; top: 10px; }
    .face {
      position: absolute;
      width: 46px;
      height: 46px;
      backface-visibility: hidden;
    }
    .front { background: #d78124; transform: translateZ(23px); }
    .right { background: #bf6c1f; transform: rotateY(90deg) translateZ(23px); }
    .top { background: #ffd84d; transform: rotateX(90deg) translateZ(23px); }
    .shadow {
      position: absolute;
      left: 26px;
      bottom: 6px;
      width: 106px;
      height: 38px;
      background: rgba(0,0,0,.34);
      transform: skewX(-34deg) rotate(-1deg);
      opacity: .72;
      animation: shadowPulse 1.45s ease-in-out infinite alternate;
    }
    .loader-text {
      min-width: 260px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #eef4f2;
      letter-spacing: 0;
    }
    .loader-bar {
      width: 260px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
    }
    .loader-bar span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #f0a126;
      transition: width .16s ease;
    }
    @keyframes cubeFloat {
      0% { transform: rotateZ(-2deg) rotateY(-20deg) translate(-4px, 0); }
      50% { transform: rotateZ(3deg) rotateY(0deg) translate(2px, -8px); }
      100% { transform: rotateZ(7deg) rotateY(20deg) translate(6px, -2px); }
    }
    @keyframes shadowPulse {
      0% { transform: skewX(-34deg) rotate(-1deg) scale(.88); opacity: .42; }
      50% { transform: skewX(-34deg) rotate(-1deg) scale(1.03); opacity: .28; }
      100% { transform: skewX(-34deg) rotate(-1deg) scale(.96); opacity: .48; }
    }
  </style>
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="cube-mark" aria-hidden="true">
        <div class="cube-row">
          <div class="iso-cube"><div class="face front"></div><div class="face right"></div><div class="face top"></div></div>
          <div class="iso-cube"><div class="face front"></div><div class="face right"></div><div class="face top"></div></div>
          <div class="iso-cube"><div class="face front"></div><div class="face right"></div><div class="face top"></div></div>
        </div>
        <div class="shadow"></div>
      </div>
      <div>
        <div id="loaderText" class="loader-text">(0KB/0KB)0%</div>
        <div class="loader-bar"><span id="loaderBar"></span></div>
      </div>
    </div>
  </div>

  <button id="captureButton" class="camera-button" type="button" aria-label="Save transparent PNG" title="Save transparent PNG">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7.7 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3.7L14.5 4Z"/><circle cx="12" cy="13" r="3.5"/></svg>
  </button>

  <model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    rotation-per-second="18deg"
    interaction-prompt="none"
    disable-pan
    shadow-intensity="0"
    exposure="1.18"
    environment-image="neutral"
    camera-orbit="45deg 65deg auto"
    min-camera-orbit="auto 0deg auto"
    max-camera-orbit="auto 180deg auto"
    field-of-view="28deg">
  </model-viewer>

  <div class="tip">拖动旋转 / 双指缩放。点击左上角相机保存透明背景 PNG。</div>
  <div id="toast" class="toast">正在生成图片...</div>

  <script>
    const MODEL_URL = 'steel_structure_cloud_view_lowpoly_draco.glb';
    const viewer = document.querySelector('#viewer');
    const button = document.querySelector('#captureButton');
    const toast = document.querySelector('#toast');
    const loader = document.querySelector('#loader');
    const loaderText = document.querySelector('#loaderText');
    const loaderBar = document.querySelector('#loaderBar');
    let userInteracted = false;

    const kb = (bytes) => Math.max(0, Math.round(bytes / 1024));
    const setProgress = (loaded, total) => {
      const percent = total > 0 ? Math.min(100, Math.round((loaded / total) * 100)) : 0;
      loaderText.textContent = `(${kb(loaded)}KB/${total > 0 ? kb(total) : '----'}KB)${percent}%`;
      loaderBar.style.width = `${percent}%`;
    };

    const showToast = (text) => {
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    };

    const stopAutoRotate = () => {
      if (!userInteracted) {
        viewer.removeAttribute('auto-rotate');
        userInteracted = true;
      }
    };

    ['pointerdown', 'touchstart', 'mousedown', 'wheel'].forEach((eventName) => {
      viewer.addEventListener(eventName, stopAutoRotate, { passive: true });
    });

    ['touchmove', 'gesturestart', 'gesturechange'].forEach((eventName) => {
      document.addEventListener(eventName, (event) => event.preventDefault(), { passive: false });
    });

    const improveMaterials = async () => {
      await customElements.whenDefined('model-viewer');
      await viewer.updateComplete;
      const model = viewer.model;
      if (!model || !model.materials) return;
      for (const material of model.materials) {
        const pbr = material.pbrMetallicRoughness;
        if (!pbr) continue;
        pbr.setMetallicFactor?.(0.92);
        pbr.setRoughnessFactor?.(0.23);
      }
    };

    const loadModelWithProgress = async () => {
      try {
        setProgress(0, 0);
        const response = await fetch(MODEL_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const total = Number(response.headers.get('content-length')) || 0;
        const reader = response.body?.getReader();
        if (!reader) {
          const blob = await response.blob();
          setProgress(blob.size, blob.size);
          viewer.src = URL.createObjectURL(blob);
          return;
        }
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.byteLength;
          setProgress(loaded, total);
        }
        const blob = new Blob(chunks, { type: 'model/gltf-binary' });
        setProgress(blob.size, total || blob.size);
        viewer.src = URL.createObjectURL(blob);
      } catch (error) {
        console.error(error);
        loaderText.textContent = '模型加载失败，请刷新重试';
      }
    };

    const hideLoader = async () => {
      await improveMaterials();
      loader.classList.add('hidden');
    };

    const downloadDataUrl = (dataUrl) => {
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = 'steel_structure_transparent.png';
      document.body.appendChild(link);
      link.click();
      link.remove();
    };

    const captureTransparentPng = async () => {
      showToast('正在生成 PNG...');
      const oldBg = viewer.style.background;
      viewer.style.background = 'transparent';
      await viewer.updateComplete;
      const oldWidth = viewer.style.width;
      const oldHeight = viewer.style.height;
      viewer.style.width = '10000px';
      viewer.style.height = '6500px';
      await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      try {
        const blob = await viewer.toBlob({ mimeType: 'image/png', idealAspect: true });
        const reader = new FileReader();
        reader.onload = () => {
          downloadDataUrl(reader.result);
          showToast('PNG 已保存');
        };
        reader.readAsDataURL(blob);
      } catch (error) {
        console.error(error);
        showToast('图片生成失败');
      } finally {
        viewer.style.width = oldWidth;
        viewer.style.height = oldHeight;
        viewer.style.background = oldBg;
      }
    };

    button.addEventListener('click', captureTransparentPng);
    viewer.addEventListener('load', hideLoader, { once: true });
    loadModelWithProgress();
  </script>
</body>
</html>
